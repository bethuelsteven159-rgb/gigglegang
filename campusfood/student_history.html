<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History – Campus Food</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<nav class="navbar">
  <span class="brand">🕐 Order History</span>

  <div style="display:flex; gap:1rem; align-items:center;">
    <span>👤 <span id="studentName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <h2>Your Order History</h2>

  <div class="panel" style="padding:0; overflow:hidden;">
    <table style="width:100%">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Vendor</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
          <th>Review</th>
        </tr>
      </thead>

      <tbody id="historyBody">
        <tr>
          <td colspan="7" style="text-align:center;padding:1.5rem;">
            Loading...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- REVIEW MODAL -->
<div id="reviewModal"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
     justify-content:center; align-items:center;">

  <div style="background:white; padding:2rem; border-radius:12px; width:90%; max-width:400px;">
    
    <h3>Leave a Review</h3>

    <div id="starContainer" style="font-size:1.8rem; margin:1rem 0;">
      <span class="star" data-value="1">☆</span>
      <span class="star" data-value="2">☆</span>
      <span class="star" data-value="3">☆</span>
      <span class="star" data-value="4">☆</span>
      <span class="star" data-value="5">☆</span>
    </div>

    <textarea id="reviewText" placeholder="Write review..."
      style="width:100%; height:100px; padding:0.5rem;"></textarea>

    <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1rem;">
      <button onclick="closeReviewModal()">Cancel</button>
      <button onclick="submitReview()">Submit</button>
    </div>

  </div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
