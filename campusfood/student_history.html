<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History – Campus Food</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <span class="brand">🕐 Order History</span>

  <div style="display:flex; gap:1rem; align-items:center;">
    <span>👤 <span id="studentName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- PAGE -->
<div class="page">
  <h2>Your Order History</h2>

  <div class="panel" style="padding:0; overflow:hidden;">
    <table style="width:100%">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Vendor</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
          <th>Review</th>
        </tr>
      </thead>

      <tbody id="historyBody">
        <tr>
          <td colspan="7" style="text-align:center;padding:1.5rem;">
            Loading...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- REVIEW MODAL -->
<div id="reviewModal" class="review-modal">

  <div class="review-box">

    <h3>Rate Your Order</h3>

    <!-- STARS -->
    <div id="starContainer" class="stars">
      <span class="star" data-value="1">☆</span>
      <span class="star" data-value="2">☆</span>
      <span class="star" data-value="3">☆</span>
      <span class="star" data-value="4">☆</span>
      <span class="star" data-value="5">☆</span>
    </div>

    <!-- QUICK REVIEW TAGS -->
    <div class="tag-box">
      <button class="tag">Arrived on time</button>
      <button class="tag">Fast service</button>
      <button class="tag">Good value</button>
      <button class="tag">Friendly staff</button>
      <button class="tag">Cold food</button>
      <button class="tag">Bad taste</button>
      <button class="tag">Small portion</button>
      <button class="tag">Great quality</button>
      <button class="tag">Would order again</button>
      <button class="tag">Poor packaging</button>
    </div>

    <!-- DESCRIPTION -->
    <textarea id="reviewText" placeholder="Optional comment..."></textarea>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="closeReviewModal()">Cancel</button>
      <button onclick="submitReview()">Submit</button>
    </div>

  </div>
</div>

<!-- JS -->
<script type="module" src="js/main.js"></script>

</body>
</html>
