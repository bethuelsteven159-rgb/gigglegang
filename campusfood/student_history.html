<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History – Campus Food</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <span class="brand">🕐 Order History</span>

    <div style="display:flex; gap:1rem; align-items:center;">
      <span>👤 <span id="studentName"></span></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page">
    <h2>Your Order History</h2>

    <div class="panel table-wrapper" style="padding:0;">
      <table style="width:100%">
        <thead>
          <tr>
            <th>Order #</th>
            <th>Vendor</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Review</th>
          </tr>
        </thead>

        <tbody id="historyBody">
          <tr>
            <td colspan="7" style="text-align:center;padding:1.5rem;">
              Loading...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- REVIEW MODAL -->
  <div id="reviewModal" class="review-modal">
    <div class="review-box">
      <div class="review-header">
        <div>
          <h3>Rate Your Order</h3>
          <p id="reviewOrderInfo" class="review-order-info">
            You are reviewing this completed order
          </p>
        </div>
        <button type="button" class="review-close" onclick="closeModal()">✕</button>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="review-summary">
        <div class="review-summary-row">
          <span class="label">Order</span>
          <span id="reviewOrderNumber">-</span>
        </div>

        <div class="review-summary-row">
          <span class="label">Vendor</span>
          <span id="reviewVendorName">-</span>
        </div>

        <div class="review-summary-row">
          <span class="label">Items</span>
          <span id="reviewItems">-</span>
        </div>

        <div class="review-summary-row">
          <span class="label">Total</span>
          <span id="reviewTotal">-</span>
        </div>
      </div>

      <!-- STARS -->
      <label class="review-subtitle">Your rating</label>
      <div id="starContainer" class="stars">
        <span class="star" data-value="1">☆</span>
        <span class="star" data-value="2">☆</span>
        <span class="star" data-value="3">☆</span>
        <span class="star" data-value="4">☆</span>
        <span class="star" data-value="5">☆</span>
      </div>

      <!-- QUICK REVIEW TAGS -->
      <label class="review-subtitle">Quick tags</label>
      <div class="tag-box">
        <button type="button" class="tag">Arrived on time</button>
        <button type="button" class="tag">Fast service</button>
        <button type="button" class="tag">Good value</button>
        <button type="button" class="tag">Friendly staff</button>
        <button type="button" class="tag">Cold food</button>
        <button type="button" class="tag">Bad taste</button>
        <button type="button" class="tag">Small portion</button>
        <button type="button" class="tag">Great quality</button>
        <button type="button" class="tag">Would order again</button>
        <button type="button" class="tag">Poor packaging</button>
      </div>

      <!-- DESCRIPTION -->
      <label for="reviewText" class="review-subtitle">Comment</label>
      <textarea id="reviewText" placeholder="Tell us what you liked or didn’t like..."></textarea>

      <!-- ACTIONS -->
      <div class="actions">
        <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="deleteReview()">Delete</button>
        <button type="button" class="btn btn-primary" onclick="submitReview()">Submit</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer"></div>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
