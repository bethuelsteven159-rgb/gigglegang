<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Food - Login</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">🍔</div>
      <h2>Campus Food</h2>
      <p class="sub">Sign in with Google to continue</p>

      <button class="btn btn-primary btn-full" id="googleLoginBtn">
        Continue with Google
      </button>

      <p id="loadingText" class="sub" style="margin-top: 1rem; display: none;"></p>

      <div id="roleSection" style="display: none; margin-top: 1.5rem;">
        <h3 style="margin-bottom: 0.5rem;">Choose your account type</h3>
        <p class="sub" style="margin-bottom: 1rem;">
          First time here? Select your role.
        </p>

        <div class="form-group">
          <label for="roleSelect">I am a...</label>
          <select id="roleSelect">
            <option value="student">Student (Buy Food)</option>
            <option value="vendor">Vendor (Sell Food)</option>
          </select>
        </div>

        <button class="btn btn-primary btn-full" id="saveRoleBtn">
          Continue
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
