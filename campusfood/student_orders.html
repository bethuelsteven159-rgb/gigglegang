<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Food – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">🛒 Order Food</span>
  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="studentName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <!-- Toggle Buttons -->
  <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
    <button id="browseByMenuBtn" class="btn btn-primary">Browse by Menu</button>
    <button id="browseByVendorBtn" class="btn" style="background: var(--surface-alt); color: var(--text);">Browse by Vendor</button>
  </div>

  <!-- Search Bar -->
  <div id="searchContainer" style="margin-bottom: 1.5rem; display: none;">
    <input type="text" id="searchInput" placeholder="🔍 Search menu items..." style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border);">
  </div>

  <!-- Filter Panel -->
  <div id="filterPanel" style="margin-bottom: 1.5rem; display: none; background: var(--surface); padding: 1rem; border-radius: 12px; border: 1px solid var(--border);">
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
      <span style="font-weight: 600;">Filter by:</span>
      <select id="priceFilter" style="padding: 0.5rem; border-radius: 6px;">
        <option value="">Price: All</option>
        <option value="low-high">Price: Low to High</option>
        <option value="high-low">Price: High to Low</option>
      </select>
      <select id="ratingFilter" style="padding: 0.5rem; border-radius: 6px;">
        <option value="">Rating: All</option>
        <option value="1">★ 1 star & up</option>
        <option value="2">★★ 2 stars & up</option>
        <option value="3">★★★ 3 stars & up</option>
        <option value="4">★★★★ 4 stars & up</option>
        <option value="5">★★★★★ 5 stars only</option>
      </select>
      <!-- NEW: Allergen/Dietary Filter Dropdown -->
      <select id="allergenFilter" style="padding: 0.5rem; border-radius: 6px;">
        <option value="">Dietary: All</option>
        <option value="halal">Halal</option>
        <option value="vegan">Vegan</option>
        <option value="vegetarian">Vegetarian</option>
        <option value="gluten-free">Gluten-Free</option>
        <option value="peanut-free">Peanut-Free</option>
        <option value="nut-free">Nut-Free</option>
        <option value="dairy-free">Dairy-Free</option>
        <option value="egg-free">Egg-Free</option>
      </select>
      <button id="mostOrderedBtn" class="btn btn-sm" style="background: var(--accent); color: white;">🔥 Most Ordered</button>
      <button id="resetFiltersBtn" class="btn btn-sm" style="background: var(--surface-alt);">Reset Filters</button>
    </div>
  </div>

  <!-- Menu Items View -->
  <div id="menuView">
    <h2>Available Menu</h2>
    <div id="menuContainer" class="menu-grid">
      <p style="color:var(--muted)">Loading menu…</p>
    </div>
  </div>

  <!-- Vendors View -->
  <div id="vendorsView" style="display: none;">
    <h2>All Vendors</h2>
    <div id="vendorsContainer" class="menu-grid">
      <p style="color:var(--muted)">Loading vendors…</p>
    </div>
  </div>

  <!-- Cart Panel -->
  <div class="panel" id="cartPanel" style="margin-top:2rem; display:none;">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
      <strong>Total: <span id="cartTotal">R0</span></strong>
      <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script type="module" src="js/main.js"></script>

</body>
</html>
