<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Food – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">🛒 Order Food</span>
  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="studentName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <!-- Toggle Buttons -->
  <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
    <button id="browseByMenuBtn" class="btn btn-primary">Browse by Menu</button>
    <button id="browseByVendorBtn" class="btn" style="background: var(--surface-alt); color: var(--text);">Browse by Vendor</button>
  </div>

  <!-- Menu Items View (default) -->
  <div id="menuView">
    <h2>Available Menu</h2>
    <div id="menuContainer" class="menu-grid">
      <p style="color:var(--muted)">Loading menu…</p>
    </div>
  </div>

  <!-- Vendors View (hidden by default) -->
  <div id="vendorsView" style="display: none;">
    <h2>All Vendors</h2>
    <div id="vendorsContainer" class="menu-grid">
      <p style="color:var(--muted)">Loading vendors…</p>
    </div>
  </div>

  <!-- Cart Panel -->
  <div class="panel" id="cartPanel" style="margin-top:2rem; display:none;">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
      <strong>Total: <span id="cartTotal">R0</span></strong>
      <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script type="module" src="js/main.js"></script>

</body>
</html>
