<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Dashboard – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">🍔 Campus Food — Vendor</span>

  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="vendorName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <h2>Welcome, <span id="vendorNameWelcome"></span></h2>

  <div class="cards">
    <a class="card" href="vendor_menu.html">
      <div class="icon">🍽️</div>
      <div class="label">Manage Menu</div>
    </a>

    <a class="card" href="vendor_orders.html">
      <div class="icon">📦</div>
      <div class="label">My Orders</div>
    </a>

    <a class="card" href="vendor_analytics.html">
      <div class="icon">📊</div>
      <div class="label">Analytics</div>
    </a>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="js/main.js"></script>

</body>
</html>
